stages:
  - lint-modules
  - deploy-module
  - lint-scripts
  - deploy-script

variables:
  RUNNER: APP

.extends:
  tags: [$RUNNER]

job-lint-modules:
  stage: lint-modules
  rules:
    - changes: [Modules/**]
  extends: [.extends]
  script: |
    [object[]]$ScriptAnalyzerResult = @()
    [System.Collections.Generic.List[object]]$ScriptAnalyzerResults = [System.Collections.Generic.List[object]]::new()

    Get-ChildItem -Path "$pwd\Modules" -File -Recurse -Include @('*.ps1', '*.psd1', '*.psm1') | % {
      [object[]]$ScriptAnalyzerResult = @(Invoke-ScriptAnalyzer -Path $_.FullName -Settings "$pwd\PSScriptAnalyzerSettings.psd1" -ErrorAction Ignore)

      $Message = "ErrorCount: $($ScriptAnalyzerResult.Count), File: $($_.FullName.Replace($PWD,'.'))"

      if ($ScriptAnalyzerResult) {
        $ScriptAnalyzerResults.AddRange($ScriptAnalyzerResult)
        Write-Warning -Message "❌ $Message"
      } else {
        Write-Verbose -Message "✅ $Message" -Verbose
      }
    }

    if ($ScriptAnalyzerResults) {
      throw "❌ Total Error Count: $($ScriptAnalyzerResults.Count)"
    } else {
      Write-Verbose -Verbose -Message "✅ Total Error Count: $($ScriptAnalyzerResults.Count)"
    }

job-deploy-module:
  stage: deploy-module
  needs: [job-lint-modules]
  rules:
    - changes: [Modules/**]
      if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  extends: [.extends]
  script: |
    Get-PSRepository | ft Name,SourceLocation
    $ImportedModules = "$pwd\Modules" | Get-ChildItem -Directory | % {Get-ChildItem -Path $_.FullName -Filter '*.psd1'} | % {Import-Module $_.FullName -Prefix 'zzz' -DisableNameChecking -PassThru -Force}
    $PublishedModules = $ImportedModules | % {Find-Module -Repository $PSRepositoryName -Name $_.Name -ErrorAction SilentlyContinue} | % -Begin {$h=@{}} -Process {$h[$_.Name] = $_.Version} -End {$h}
    $diff = $ImportedModules | Select-Object -Property Name,Version,@{n='PublishedVersion';e={if($PublishedModules.ContainsKey($_.Name)){$PublishedModules[$_.Name]}else{[System.Version]::new()}}},ModuleBase
    $ShowDiff = $diff | Select-Object Name,Version,PublishedVersion | Format-Table -AutoSize | Out-String
    'diff modules'
    $ShowDiff
    $ToPublish = $diff | ? {$_.Version -gt $_.PublishedVersion}
    #if ($ToPublish) {$ToPublish | % {Publish-Module -Path $_.ModuleBase -NuGetApiKey $NuGetApiKey -Repository $PSRepositoryName}}
    if ($ToPublish) {
      $ToPublish | Select-Object -Property @(
        ,@{n='Script';e={$_.BaseName}}
        ,@{n='_Publish';e={$r=@{success=$true;error=''};try{$_ = Publish-Module -Verbose -Path $_.ModuleBase -NuGetApiKey $NuGetApiKey -Repository $PSRepositoryName}catch{$r['success']=$false;$r['error']=$_.Exception.Message}finally{$r}}}
      ) | Select-Object -Property @(
        ,'Script'
        ,@{n='Published';e={$_._Publish.success}}
        ,@{n='Error';e={$_._Publish.error}}
      ) | fl
    }

job-lint-scripts:
  stage: lint-scripts
  rules:
    - changes: [Scripts/**]
  extends: [.extends]
  script: |
    Get-ChildItem -Path "$pwd\Scripts" -File -Recurse -Include @('*.ps1', '*.psd1', '*.psm1') | % {
      [object[]]$ScriptAnalyzerResult = @(Invoke-ScriptAnalyzer -Path $_.FullName -Settings "$pwd\PSScriptAnalyzerSettings.psd1" -ErrorAction Ignore)

      $Message = "ErrorCount: $($ScriptAnalyzerResult.Count), File: $($_.FullName.Replace($PWD,'.'))"

      if ($ScriptAnalyzerResult) {
        $ScriptAnalyzerResults.AddRange($ScriptAnalyzerResult)
        Write-Warning -Message "❌ $Message"
      } else {
        Write-Verbose -Message "✅ $Message" -Verbose
      }
    }

    if ($ScriptAnalyzerResults) {
      throw "❌ Total Error Count: $($ScriptAnalyzerResults.Count)"
    } else {
        Write-Verbose -Verbose -Message "✅ Total Error Count: $($ScriptAnalyzerResults.Count)"
    }

job-deploy-script:
  stage: deploy-script
  needs: [job-lint-scripts]
  rules:
    - changes: [Scripts/**]
      if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  extends: [.extends]
  script: |
    $Scripts = Get-ChildItem -Path "$pwd\Scripts\*.ps1"
    $Scripts | Select-Object -Property @(
      ,@{n='Script';e={$_.BaseName}}
      ,@{n='_Publish';e={$r=@{success=$true;error=''};try{$_ = Publish-Script -Path $_.FullName -NuGetApiKey $NuGetApiKey -Repository $PSRepositoryName}catch{$r['success']=$false;$r['error']=$_.Exception.Message}finally{$r}}}
    ) | Select-Object -Property @(
      ,'Script'
      ,@{n='Published';e={$_._Publish.success}}
      ,@{n='Error';e={$_._Publish.error}}
    ) | fl
